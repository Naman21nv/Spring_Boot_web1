# application.properties
# 
# Purpose:
# - Central configuration file for Spring Boot applications.
# - Used to customize default Spring Boot settings or define custom properties.
#
# Key concepts and theory:
# - Spring Boot Auto-configuration relies on sensible defaults. When you need to override these defaults,
#   you define properties in this file (or application.yml).
# - Properties defined here are loaded into the Spring Environment and can be injected into beans using @Value
#   or bound to objects using @ConfigurationProperties.
#
# Execution flow:
# 1. During application startup, Spring Boot scans standard locations (like the classpath root) for application.properties.
# 2. It loads these properties into the Environment abstraction.
# 3. Any beans or auto-configurations that depend on these properties are configured accordingly.
#
# Detailed per-line explanation:

# Sets the logical name of the application. This is useful for monitoring, logging, and service discovery in microservices.
spring.application.name=SpringBoot_web

# Changes the default port (which is usually 8080) for the embedded web server (e.g., Tomcat) to listen on.
# When the application starts, it will be accessible at http://localhost:8081.
server.port=8081

# Spring MVC View Resolution Configuration
#
# Purpose:
# - These properties configure how Spring MVC's InternalResourceViewResolver (or similar) locates view templates (like JSPs).
# - They allow you to specify a common prefix (directory path) and suffix (file extension) for your view names.
#
# Key Concepts and Theory:
# - View Resolver: A component in Spring MVC responsible for mapping logical view names (e.g., "index", "return") returned by controllers to actual view technologies (e.g., JSP files, Thymeleaf templates).
# - Decoupling: By using a prefix and suffix, your controller methods only need to return the *logical name* of the view (e.g., "index"). They don't need to know the exact file path or extension.
#   This decouples the controller logic from the view layer's physical location and technology.
#
# Why use this?
# 1. Maintainability: If you decide to move your JSP files to a different directory (e.g., from `/webapp/` to `/webapp/WEB-INF/views/`) or change the file extension (e.g., from `.jsp` to `.html`),
#    you only need to update these two properties in `application.properties`, not every `return "..."` statement in your controllers.
# 2. Readability: Controller methods become cleaner, returning simple, meaningful names like "home" or "result" instead of "WEB-INF/views/home.jsp".
# 3. Flexibility: Makes it easier to switch view technologies in the future (e.g., from JSP to Thymeleaf) with minimal controller changes.
#
# How it works:
# When a controller method returns a String like "index":
# The View Resolver takes the `prefix` + `returned_string` + `suffix`.
# Example: `/view/` + `index` + `.jsp` = `/view/index.jsp`
# This is the actual path where the View Resolver will look for the JSP file.

# Defines the prefix (directory path) for your view files.
# For JSPs, this points to the directory under `src/main/webapp/`.
# JSPs are at `src/main/webapp/view/`, so the prefix is `/view/`.
spring.mvc.view.prefix=/View/

# Defines the suffix (file extension) for your view files.
# For JSPs, this is typically `.jsp`.
spring.mvc.view.suffix=.jsp
